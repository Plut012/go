# Minimal Analysis Config for KataGo CPU (Eigen) Backend
# Optimized for territory estimation and light AI play

# Logs (minimal logging for production)
logFile = katago.log
logAllRequests = false
logAllResponses = false
logSearchInfo = false

# Analysis settings
reportAnalysisWinratesAs = BLACK

# Search limits
# Optimized for fast territory estimation (50 visits = ~1s response time)
maxVisits = 50

# CPU-only threading configuration
# For CPU (Eigen backend):
# - Keep total threads modest (2-8 threads total)
# - Balance between parallelism and CPU overhead
numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 4

# Neural net cache (smaller for CPU usage)
nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 16
nnRandomize = true

# Rules (standard settings for Go)
rules = tromp-taylor
koRule = POSITIONAL
scoringRule = AREA
taxRule = NONE
multiStoneSuicideLegal = false
hasButton = false

# Komi
komi = 7.5

# Bot behavior
conservativePass = true
preventCleanupPhase = true
assumeMultipleStartingBlackMovesAreHandicap = true

# Performance tuning for CPU
# Batch size for neural net (keep small for CPU)
nnMaxBatchSize = 8

# Board size limits (19x19 only for now)
maxBoardXSizeForNNBuffer = 19
maxBoardYSizeForNNBuffer = 19
